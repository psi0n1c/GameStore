<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameStore</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="index-header">
        <a href="#top">GameStore</a>
        <div class="btn-container"><button id="profile-btn" onclick="openProfile()">P</button></div>
    </header>
    <div class="sections">
        <div class="left-section">
            <h1 id="games-list-title">Available Games</h1>
            <div class="games-container"></div>
        </div>
        <div class="right-section">
            <h2>Your Cart</h2>
            <h3>Click on items to remove them</h3>
            <div class="bold" id="cart-total">Total: <span class="bold" id="total-amount">$0.00</span></div>
            <div id="cart-items"></div>
            <div class="cart-buttons">
                <button id="checkout-btn" onclick="checkout()">Checkout</button>
                <button id="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
            </div>
        </div> 
    </div>

    <script src="main.js"></script>
</body>
</html>

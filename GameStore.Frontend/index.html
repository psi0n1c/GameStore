<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameStore</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="index-header text-white">
        <a href="#top" class="text-white">GameStore</a>
        <div class="btn-container"><button id="profile-btn" onclick="openProfile()">P</button></div>
    </header>
    <div class="sections">
        <div class="left-section">
            <h1 id="games-list-title" class="text-white">Available Games</h1>
            <div id="filters-container">
                <div>
                    <p class="text-white">Filter by genre:</p>
                    <select name="genre-dropdown" class="dropdown text-white" onchange="genreFilter(this.value)">
                        <option value="All">All genres</option>
                        <option value="Fighting">Fighting</option>
                        <option value="RPG">RPG</option>
                        <option value="Platformer">Platformer</option>
                        <option value="Racing">Racing</option>
                        <option value="Sports">Sports</option>
                    </select>
                </div>
                <div>
                    <p class="text-white">Sort by price:</p>
                    <select name="filter-price-dropdown" class="dropdown text-white" onchange="sortGames(this.value)">
                        <option value="def">Default</option>
                        <option value="asc">Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                </div>
            </div>
            <div class="games-container"></div>
        </div>
        <div class="right-section">
            <h2>Your Cart</h2>
            <h3>Click on items to remove them</h3>
            <div class="bold" id="cart-total">Total: <span class="bold" id="total-amount">$0.00</span></div>
            <div id="cart-items"></div>
            <div class="cart-buttons">
                <button class="text-white" id="checkout-btn" onclick="checkout()">Checkout</button>
                <button class="text-white" id="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
            </div>
        </div> 
    </div>

    <script src="main.js"></script>
</body>
</html>
